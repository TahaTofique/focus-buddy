<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — TAHA.SYS</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2304060A'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23B6FF3C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #04060A;
    --bg-panel: #0A0F14;
    --text: #E7FBEA;
    --text-dim: #6E7B76;
    --accent: #B6FF3C;
    --cyan: #3CF0FF;
    --magenta: #FF3C7A;
    --line: rgba(182,255,60,0.18);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:var(--bg); color:var(--text); font-family:'JetBrains Mono', monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background-image:
      linear-gradient(rgba(182,255,60,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(182,255,60,0.045) 1px, transparent 1px);
    background-size:44px 44px;
  }
  .box{ text-align:center; padding:40px; }
  .code{
    font-family:'Orbitron', sans-serif; font-weight:800; font-size:clamp(4rem, 14vw, 8rem);
    color:var(--text); letter-spacing:0.05em; line-height:1;
    text-shadow:0 0 30px rgba(182,255,60,0.15);
  }
  .code span{ color:var(--accent); }
  .msg{ font-size:14px; color:var(--cyan); letter-spacing:0.08em; margin-top:14px; text-transform:uppercase; }
  .sub{ font-size:12.5px; color:var(--text-dim); margin-top:10px; max-width:420px; margin-left:auto; margin-right:auto; line-height:1.7; }
  .btn{
    display:inline-flex; align-items:center; gap:8px; margin-top:32px; padding:12px 22px;
    border:1px solid var(--accent); color:var(--accent); text-decoration:none; font-size:13px;
    clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .btn:hover{ box-shadow:0 0 20px rgba(182,255,60,0.3); transform:translateY(-2px); }
  .cursor{ display:inline-block; width:9px; height:16px; background:var(--accent); animation:blink 1s step-end infinite; vertical-align:middle; margin-left:4px; }
  @keyframes blink{ 50%{ opacity:0; } }
</style>
</head>
<body>
  <div class="box">
    <div class="code">4<span>0</span>4</div>
    <div class="msg">// ACCESS DENIED — ROUTE NOT FOUND<span class="cursor"></span></div>
    <p class="sub">This path doesn't exist on TAHA.SYS. It may have been moved, renamed, or never compiled in the first place.</p>
    <a href="/Portfolio/" class="btn">return_home →</a>
  </div>
</body>
</html>
